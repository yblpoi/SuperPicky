name: Build and Release SuperPicky

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number for the release'
        required: true

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements_cuda.txt

      - name: Prepare telemetry build override
        env:
          COUNTLY_APP_KEY: ${{ secrets.COUNTLY_APP_KEY }}
          COUNTLY_SERVER_URL: ${{ secrets.COUNTLY_SERVER_URL }}
        run: python scripts/prepare_telemetry_build.py --output _telemetry_build.py

      - name: Resolve release metadata
        id: release_meta
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: python scripts/ci_release.py resolve-metadata

      - name: Build Full release
        env:
          RELEASE_TAG: ${{ steps.release_meta.outputs.tag }}
        run: python build_release_win.py --build-type cpu --copy-dir output --no-zip

      - name: Create Full installer with Inno Setup
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.7
        with:
          path: ./output/installer_cpu/SuperPicky.iss

      - name: Build Lite release
        env:
          RELEASE_TAG: ${{ steps.release_meta.outputs.tag }}
        run: python build_release_win.py --build-type lite --copy-dir output --no-zip

      - name: Create Lite installer with Inno Setup
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.7
        with:
          path: ./output/installer_lite/SuperPicky-lite.iss

      - name: Prepare release assets
        run: |
          python scripts/ci_release.py collect-assets --output-dir release_assets --pattern output/installer_cpu/Output/SuperPicky_Setup_Full_Win64_*.exe --pattern output/installer_lite/Output/SuperPicky_Setup_Lite_Win64_*.exe

      - name: Build code patch zip
        run: python scripts/ci_release.py build-patch --output-dir release_assets --patch-version ${{ steps.release_meta.outputs.tag }}

      - name: Clean telemetry build override
        if: always()
        run: python scripts/ci_release.py cleanup-paths --path _telemetry_build.py

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          name: ${{ steps.release_meta.outputs.name }}
          body_path: ChangeLog.md
          fail_on_unmatched_files: true
          files: |
            release_assets/*

  build-mac:
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements_mac.txt

      - name: Prepare telemetry build override
        env:
          COUNTLY_APP_KEY: ${{ secrets.COUNTLY_APP_KEY }}
          COUNTLY_SERVER_URL: ${{ secrets.COUNTLY_SERVER_URL }}
        run: python scripts/prepare_telemetry_build.py --output _telemetry_build.py

      - name: Resolve release metadata
        id: release_meta
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: python scripts/ci_release.py resolve-metadata

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements_mac.txt

      - name: Materialize signing certificate
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
        run: python scripts/ci_release.py materialize-secret-file --env-name MACOS_CERTIFICATE --output $RUNNER_TEMP/certificate.p12 --decode-base64

      - name: Build notarized macOS release
        env:
          RELEASE_TAG: ${{ steps.release_meta.outputs.tag }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          python build_release_mac.py --build-type full --arch arm64 --copy-dir output/mac --sign-p12 $RUNNER_TEMP/certificate.p12 --sign-p12-password-env MACOS_CERTIFICATE_PWD --notarize --apple-id ${{ secrets.APPLE_ID }} --team-id ${{ secrets.MACOS_TEAM_ID }}

      - name: Build code patch zip
        run: python scripts/ci_release.py build-patch --output-dir output/mac --patch-version ${{ steps.release_meta.outputs.tag }}

      - name: Clean up
        if: always()
        run: python scripts/ci_release.py cleanup-paths --path _telemetry_build.py --path $RUNNER_TEMP/certificate.p12

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          name: ${{ steps.release_meta.outputs.name }}
          body_path: ChangeLog.md
          fail_on_unmatched_files: true
          files: |
            output/mac/*.dmg
            output/mac/code_patch_*.zip
            output/mac/patch_meta.json
